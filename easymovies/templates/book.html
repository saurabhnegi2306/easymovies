{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">

                <h3 class="mb-0">
                    🎟️ Book Movie Ticket
                </h3>

            </div>

            <div class="card-body">

                <h4>{{ movie.name }}</h4>

                <p class="text-muted">

                    <strong>Theatre:</strong>
                    {{ movie.theatre }}

                </p>

                <p>

                    <strong>Available Seats:</strong>

                    <span class="badge bg-success">

                        {{ movie.available_seats }}

                    </span>

                </p>

                <hr>

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">

                            Customer Name

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="customer"
                            placeholder="Enter your name"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Number of Seats

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="seats"
                            min="1"
                            max="{{ movie.available_seats }}"
                            value="1"
                            required>

                    </div>

                    <div class="d-grid">

                        <button
                            class="btn btn-success btn-lg">

                            Confirm Booking

                        </button>

                    </div>

                </form>

            </div>

            <div class="card-footer">

                <a href="/"
                   class="btn btn-secondary">

                    ← Back to Movies

                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
